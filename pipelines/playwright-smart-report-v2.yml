schedules:
- cron: "0 */8 * * 1-5"
  displayName: "Weekday poc 2-hourly run (UTC)"
  branches:
    include:
      - poc-pw-smart-report
  always: true   # REQUIRED for scheduled runs with no code changes


pool:
  vmImage: ubuntu-latest

container: 
  image: mcr.microsoft.com/playwright:v1.57.0-noble 
  env: 
    PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    # FIX 1: Pass the BuildID so the config can generate unique Run IDs
    BUILD_BUILDID: $(Build.BuildId)

variables:
  NODE_VERSION: '20.x'
  REPORT_ARTIFACT_NAME: 'pw-smart-report'
  SMART_CACHE_DIR: '$(Build.SourcesDirectory)/.pw-smart-cache'
  # Moving to v8 to ensure we start with the corrected JSON structure
  CACHE_VERSION: 'v8' 

steps:
- task: NodeTool@0
  inputs:
    versionSpec: $(NODE_VERSION)
  displayName: 'Setup Node.js'

- script: npm ci
  displayName: 'Install NPM Dependencies'

# 1. RESTORE
- task: Cache@2
  displayName: Restore Smart Reporter history
  inputs:
    key: '"pw-smart" | "$(CACHE_VERSION)" | "$(Build.SourceBranchName)" | "$(Build.BuildId)"'
    restoreKeys: |
      "pw-smart" | "$(CACHE_VERSION)" | "$(Build.SourceBranchName)"
      "pw-smart" | "$(CACHE_VERSION)"
    path: $(SMART_CACHE_DIR)

# 2. PREP (Update this block)
- script: |
    # Copy from Cache to ROOT (safe from deletion)
    if [ -f "$(SMART_CACHE_DIR)/test-history.json" ]; then
      cp $(SMART_CACHE_DIR)/test-history.json test-history.json
      echo "✅ History found and synced to ROOT"
    else
      # Initialize in ROOT
      echo '{"runs":[],"tests":{},"summaries":[]}' > test-history.json
      echo "⚠️ Starting fresh $(CACHE_VERSION) timeline"
    fi
  displayName: 'Sync Cache to Root'

# 3. RUN (Update this block)
- script: |
    mkdir -p src/docs
    # Playwright will wipe 'test-results', but 'test-history.json' is now safe in the root!
    PLAYWRIGHT_BROWSERS_PATH=/ms-playwright npx playwright test --config=playwright.smart.config.js || true
  displayName: 'Run Playwright tests'

# 4. SYNC BACK (Update this block)
- script: |
    mkdir -p $(SMART_CACHE_DIR)
    # Copy from ROOT back to Cache
    cp test-history.json $(SMART_CACHE_DIR)/test-history.json
    
    # Optional: Put a copy in artifacts for debugging
    cp test-history.json test-results/test-history.json
  displayName: 'Sync History to Cache'
  condition: always()

# 5. SAVE
- task: Cache@2
  displayName: Save Smart Reporter history
  condition: always()
  inputs:
    key: '"pw-smart" | "$(CACHE_VERSION)" | "$(Build.SourceBranchName)" | "$(Build.BuildId)"'
    path: $(SMART_CACHE_DIR)
    
# 6. PUBLISH
- task: PublishTestResults@2
  condition: succeededOrFailed()
  inputs:
    testResultsFormat: 'JUnit'
    testResultsFiles: 'test-results/results.xml'
    testRunTitle: 'Playwright Smart Reporter'

- task: PublishPipelineArtifact@1
  condition: succeededOrFailed()
  inputs:
    targetPath: 'test-results'
    artifact: $(REPORT_ARTIFACT_NAME)
    