trigger: none

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

steps:
- checkout: self

- task: NodeTool@0
  inputs:
    versionSpec: '20.x'

- script: npm ci
  displayName: "Install dependencies"

- script: npx playwright install --with-deps
  displayName: "Install Playwright"

- script: npm run test:smoke
  displayName: "Run smoke tests"