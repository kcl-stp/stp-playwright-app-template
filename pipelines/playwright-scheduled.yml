trigger: none

schedules:
  - cron: "0 2 * * *"   # 2am daily
    displayName: Daily Run
    branches:
      include:
        - main
    always: true

pool:
  vmImage: 'ubuntu-latest'

steps:
  - checkout: self

  - script: npm install
    displayName: Install dependencies

  - script: npx playwright install
    displayName: Install browsers

  - script: npx playwright test
    displayName: Run tests
    